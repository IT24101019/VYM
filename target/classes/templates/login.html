<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>YOMIRU VYMS — Sign In</title>
    <link rel="stylesheet" th:href="@{/css/login.css(v=3)}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-card-logo">
                <img th:src="@{/images/logo.png}" alt="YOMIRU">
            </div>

            <h2 class="login-heading">Welcome back</h2>
            <p class="login-sub">Sign in to your VYMS account</p>

            <div th:if="${param.error}" class="alert-error">
                <i class="fas fa-exclamation-circle"></i>
                Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert-success">
                <i class="fas fa-check-circle"></i>
                You have been signed out successfully.
            </div>

            <form th:action="@{/login}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope form-icon"></i> Email Address</label>
                    <input type="email" id="email" th:field="*{email}"
                        placeholder="your.email@yomiru.com" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock form-icon"></i> Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="password" th:field="*{password}"
                            placeholder="••••••••" required autocomplete="current-password" />
                        <button type="button" class="pw-toggle" onclick="togglePw()">
                            <i class="fas fa-eye" id="pwIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-signin">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="login-footer">
                <p class="footer-brand">© 2026 <strong>(株)YOMIRU商会</strong> · All rights reserved</p>
            </div>
        </div>
    </div>

    <script>
        function togglePw() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('pwIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pw.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
